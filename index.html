<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil | Timothé R.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-flex">
            <span class="logo">✦ Timothé</span>
            <div class="nav-links">
                <a href="index.html" class="active">Accueil</a>
                <a href="projets.html">Projets</a>
                <a href="competences.html">Compétences</a>
                <button id="themeToggle" class="theme-toggle-btn"><i class="fas fa-sun"></i></button>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="hero fade-in">
            <div class="hero-badge"><i class="fas fa-user"></i> Présentation</div>
            <h1 id="userNameDisplay">Timothé R.</h1>
            <p id="userBio" class="lead">Passionné par le code et le hardware. Bienvenue sur mon espace personnel où je partage mes créations logicielles et mes projets techniques.</p>
            
            <div class="stats-container" id="statsContainer">
                <div class="stat-item">
                    <i class="fas fa-code-branch stat-icon"></i>
                    <div class="stat-info">
                        <h4>Logiciel</h4>
                        <span class="value">Développement</span>
                    </div>
                </div>
                <div class="stat-item">
                    <i class="fas fa-tools stat-icon"></i>
                    <div class="stat-info">
                        <h4>Hardware</h4>
                        <span class="value">Réparation</span>
                    </div>
                </div>
            </div>
            <div style="margin-top: 2rem;">
                <a href="projets.html" class="btn-primary">Voir mes projets GitHub</a>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
